<!-- Minimal Google Slides slide indicator fixture -->
<!-- Captured from: https://docs.google.com/presentation (March 2026) -->
<!-- In production this element lives inside a same-origin presentation iframe -->
<!-- that only loads when the slideshow is running. The fixture places it directly -->
<!-- in document.body because jsdom does not load iframe content. -->
<!-- Update this file and the adapter selector if Google changes their DOM -->
<div
  class="punch-viewer-svgpage-a11yelement"
  aria-label="Slide 3 of 42: Title text"
  role="img"
  tabindex="0"
></div>
